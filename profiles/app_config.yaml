    type: "ignore"
    x: [0.2, 0.6] #[1.95, 2.58]
    y: [2.2, 2.5] #[1.6, 2.64]
    z: [0, 0.72] #[0.0, 1.2]
    arm_move: [500, 500, 500, 500, 500, 500] # motor positions
    radar_pose:
      x: 2.5
      y: 0
      z: 0.72
      yaw_deg: -45
      pitch_deg: -30
      fov_deg: 120
  Chair:
    type: "monitor"
    x: [0.2, 0.6]
    y: [1.8, 2.2]
    z: [0.0, 1.2]
    arm_move: [500, 500, 500, 500, 500, 600] # motor positions
    radar_pose:
      x: 2.5
      y: 0
      z: 0.72
      yaw_deg: -45
      pitch_deg: -30
      fov_deg: 120

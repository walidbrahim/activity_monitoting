pushover:
  user_key: "ua846nsmwipsvkvk2r7guc1koekhnf"
  api_token: "arh5d8i8nprcfovit7kyobse1p3ey4"

radar:
  config_file_path: 'profiles/60ghz_25fps_6843_8ant_15cm.txt'
  antennas: 8
  range_resolution: 0.15
  frame_rate: 25
  range_idx_num: 35
  ti_1dfft_queue_len: 25
  magic_word: [0x0708050603040101, 0x0708050603040102, 0x0708050603040103, 0x0708050603040104, 0x0708050603040105, 0x0708050603040106, 0x0708050603040107, 0x0708050603040108]
  start_frequency: 60
  chirp_loop: 16
  range_bins: 64
  chirp_slope: 32
  chirp_end_time: 36
  adc_start: 2
  chirp_idle_time: 15
  adc_sample_rate: 2000
  tx_ant: 2
  rx_ant: 4

pipeline:
  detection_threshold: 150.0
  static_margin: 200
  alpha: 0.05
  track_alpha: 0.05
  frame_to_confirm_zone: 50
  buffer_size: 50
  miss_allowance: 25
  features:
    clutter_removal: true
    vital_analysis: true
    tethering: false
    apnea_state: true
    temporal_persistence: true
    adaptive_smoothing: true
    fall_posture: true

posture:
  fall_detection_enable: true
  fall_threshold: 0.5
  fall_velocity_threshold: -1.2
  sitting_threshold: 0.6
  standing_threshold: 1.1

motion:
  rest_max: 0.1
  restless_max: 0.3

respiration:
  resp_window_sec: 30

app:
  log_level: 10
  need_send_ti_config: true
  send_alert: true
  enable_robot_arm: false
  default_radar_pose: "Bed"

gui_theme:
  fig_bg: "#0F172A"
  panel_bg: "#1E1B4B"
  card_bg: "#1E293B"
  card_ok: "#059669"
  card_warn: "#D97706"
  card_alert: "#DC2626"
  text: "#E5E7EB"
  subtext: "#9CA3AF"
  grid: "#334155"
  bed: "#6366F1"
  chair: "#14B8A6"
  monitor: "#6B8E7A"
  ignore: "#DC2626"
  occupant: "#22D3EE"
  room_edge: "#CBD5E1"
  fov: "#EF4444"
  radar: "#F43F5E"
  origin: "#FACC15"

tuning:
  min_search_range: 0.30
  num_candidates: 15
  ghost_phase_threshold: 0.0005
  macro_displacement_mm: 15.0
  z_clip_min: 0.05
  z_clip_max: 1.80
  jump_reject_distance: 1.5
  warmup_seconds: 1.0
  entry_hold_seconds: 3.0
  reassess_seconds: 3.0
  # Aliveness Check: Layer 1 — SNR Floor
  min_person_snr: 80.0
  # Aliveness Check: Layer 2 — Position Stability
  position_stability_window: 75
  max_clutter_position_var: 0.08
  # Aliveness Check: Layer 3 — Multi-Metric Spectral Quality
  aliveness_threshold: 0.40
  breathing_displacement_min: 0.5
  breathing_displacement_max: 12.0
